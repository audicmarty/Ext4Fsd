name: Build Ext4Fsd Driver

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        platform: [x64, ARM64]
        configuration: [Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install WDK 10.0.22000.1
        run: choco install windowsdriverkit11 -y --no-progress

      - name: Verify WDK headers
        run: |
          $ntifs = Get-Item "C:\Program Files (x86)\Windows Kits\10\Include\10.0.22000.0\km\ntifs.h" -ErrorAction SilentlyContinue
          if ($ntifs) {
            Write-Host "ntifs.h found: $($ntifs.FullName)"
          } else {
            Write-Host "ntifs.h NOT found, listing available WDK includes:"
            Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Include\" -ErrorAction SilentlyContinue | Select-Object Name
          }

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build driver
        run: |
          msbuild Ext4Fsd.sln `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:WindowsTargetPlatformVersion=10.0.22000.0 `
            /m /v:minimal

      - name: Upload driver artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ext4Fsd-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            **/*.sys
            **/*.inf
            **/*.pdb
          if-no-files-found: warn
