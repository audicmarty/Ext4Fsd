name: Build Ext4Fsd Driver

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    strategy:
      matrix:
        platform: [x64, ARM64]
        configuration: [Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install WDK and SDK via NuGet
        run: |
          $platform = "${{ matrix.platform }}".ToLower()
          $version = "10.0.26100.6584"
          nuget install Microsoft.Windows.SDK.CPP -Version $version -OutputDirectory packages
          nuget install "Microsoft.Windows.SDK.CPP.$platform" -Version $version -OutputDirectory packages
          nuget install "Microsoft.Windows.WDK.$platform" -Version $version -OutputDirectory packages

      - name: Create Directory.Build.props
        run: |
          $version = "10.0.26100.6584"
          $sdkDir = (Get-ChildItem packages -Directory | Where-Object { $_.Name -like "Microsoft.Windows.SDK.CPP.$version" }).Name
          $wdkDir = (Get-ChildItem packages -Directory | Where-Object { $_.Name -like "Microsoft.Windows.WDK.*$version" }).Name
          Write-Host "SDK dir: $sdkDir"
          Write-Host "WDK dir: $wdkDir"
          Write-Host "=== WDK package contents ==="
          Get-ChildItem "packages\$wdkDir" -Recurse | Select-Object -ExpandProperty FullName
          # SDK: hardcode known props filename (avoid getting multiple files)
          $sdkPropsPath = "packages\$sdkDir\build\Microsoft.Windows.SDK.cpp.props"
          # WDK: search recursively for a .props file
          $wdkPropsItem = Get-ChildItem "packages\$wdkDir" -Filter "*.props" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($wdkPropsItem) {
            $wdkPropsPath = $wdkPropsItem.FullName.Replace((Get-Location).Path + "\", "")
            Write-Host "WDK props found: $wdkPropsPath"
            "<Project>" | Set-Content "Directory.Build.props"
            "  <Import Project=`"$sdkPropsPath`" />" | Add-Content "Directory.Build.props"
            "  <Import Project=`"$wdkPropsPath`" />" | Add-Content "Directory.Build.props"
            "</Project>" | Add-Content "Directory.Build.props"
          } else {
            Write-Host "No WDK .props found - setting WDKContentRoot directly"
            $wdkRoot = "packages\$wdkDir\"
            "<Project>" | Set-Content "Directory.Build.props"
            "  <Import Project=`"$sdkPropsPath`" />" | Add-Content "Directory.Build.props"
            "  <PropertyGroup><WDKContentRoot>$((Get-Location).Path)\$wdkRoot</WDKContentRoot></PropertyGroup>" | Add-Content "Directory.Build.props"
            "</Project>" | Add-Content "Directory.Build.props"
          }
          Write-Host "=== Directory.Build.props ==="
          Get-Content "Directory.Build.props"

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build driver
        run: |
          msbuild Ext4Fsd.sln `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:WindowsTargetPlatformVersion=10.0.26100.0 `
            /m /v:minimal

      - name: Upload driver artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ext4Fsd-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            **/*.sys
            **/*.inf
            **/*.pdb
          if-no-files-found: warn
