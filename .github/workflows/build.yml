name: Build Ext4Fsd Driver

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    strategy:
      matrix:
        platform: [x64, ARM64]
        configuration: [Release]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install WDK and SDK via NuGet
        run: |
          $platform = "${{ matrix.platform }}".ToLower()
          $version = "10.0.26100.6584"
          nuget install Microsoft.Windows.SDK.CPP -Version $version -OutputDirectory packages
          nuget install "Microsoft.Windows.SDK.CPP.$platform" -Version $version -OutputDirectory packages
          nuget install "Microsoft.Windows.WDK.$platform" -Version $version -OutputDirectory packages

      - name: Create Directory.Build.props
        run: |
          $version = "10.0.26100.6584"
          # Find actual directory names (handles case differences like ARM64 vs arm64)
          $sdkDir = (Get-ChildItem packages -Directory | Where-Object { $_.Name -like "Microsoft.Windows.SDK.CPP.$version" }).Name
          $wdkDir = (Get-ChildItem packages -Directory | Where-Object { $_.Name -like "Microsoft.Windows.WDK.*$version" }).Name
          $sdkProps = (Get-ChildItem "packages\$sdkDir\build" -Filter "*.props").Name
          $wdkProps = (Get-ChildItem "packages\$wdkDir\build" -Filter "*.props").Name
          Write-Host "SDK: packages\$sdkDir\build\$sdkProps"
          Write-Host "WDK: packages\$wdkDir\build\$wdkProps"
          @"
<Project>
  <Import Project="packages\$sdkDir\build\$sdkProps" />
  <Import Project="packages\$wdkDir\build\$wdkProps" />
</Project>
"@ | Set-Content "Directory.Build.props"

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build driver
        run: |
          msbuild Ext4Fsd.sln `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=${{ matrix.platform }} `
            /p:WindowsTargetPlatformVersion=10.0.26100.0 `
            /m /v:minimal

      - name: Upload driver artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ext4Fsd-${{ matrix.configuration }}-${{ matrix.platform }}
          path: |
            **/*.sys
            **/*.inf
            **/*.pdb
          if-no-files-found: warn
